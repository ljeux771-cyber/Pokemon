{% extends "base.html" %}

{% block title %}Connexion · Poké-Quiz{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto">
    <div class="bg-slate-900/80 border border-slate-800 rounded-xl shadow-xl shadow-slate-900/50 p-6">
      <h1 class="text-2xl font-semibold mb-1">Connexion</h1>
      <p class="text-sm text-slate-400 mb-6">
        Reprends ta partie et tente de battre ton record !
      </p>

      <form method="post" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1" for="username">Nom d’utilisateur</label>
          <input
            id="username"
            name="username"
            type="text"
            required
            class="w-full rounded-md bg-slate-900 border border-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1" for="password">Mot de passe</label>
          <input
            id="password"
            name="password"
            type="password"
            required
            class="w-full rounded-md bg-slate-900 border border-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"
          />
        </div>

        <button
          type="submit"
          class="w-full flex justify-center items-center gap-2 rounded-md bg-primary hover:bg-red-500 text-sm font-medium py-2.5 mt-2 transition shadow-lg shadow-red-500/40"
        >
          Se connecter
        </button>
      </form>

      <p class="mt-4 text-xs text-slate-400 text-center">
        Pas encore de compte ?
        <a href="{{ url_for('auth.register') }}" class="text-secondary hover:underline">Créer un compte</a>
      </p>
    </div>
  </div>
{% endblock %}
